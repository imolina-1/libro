<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de lectura — Entre tonos de gris</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f4ef;
      --paper: #fdfcf9;
      --ink: #1a1814;
      --ink-light: #4a4540;
      --ink-faint: #8a847c;
      --border: #d8d0c4;
      --border-light: #ece6dc;
      --accent: #7a3e2a;
      --accent-light: #f2ebe3;
      --correct: #2d5a27;
      --correct-bg: #edf4ec;
      --wrong: #7a2020;
      --wrong-bg: #f7eeee;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 4rem 2rem 3rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    .header-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1.2rem;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    header h1 em {
      font-style: italic;
      font-weight: 300;
    }

    .header-author {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink-faint);
      margin-bottom: 1.5rem;
    }

    .header-rule {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto;
    }

    /* ── Main layout ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── Datos del alumno ── */
    .datos-section {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem 2.25rem;
      margin-bottom: 3rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-light);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 1px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      background: var(--paper);
    }

    /* ── Preguntas ── */
    .q-block {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.75rem 2.25rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .q-block:hover { border-color: #c0b8ae; }

    .q-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .q-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
      padding-top: 2px;
    }

    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--ink);
    }

    .opts {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-left: 1.5rem;
    }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 0.85rem;
      border: 1px solid transparent;
      border-radius: 1px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 1rem;
      line-height: 1.5;
    }

    .opt:hover { background: var(--accent-light); border-color: var(--border-light); }

    .opt input[type="radio"] {
      margin-top: 3px;
      flex-shrink: 0;
      accent-color: var(--accent);
      width: 15px;
      height: 15px;
    }

    .opt span { color: var(--ink-light); }

    /* Estados tras corrección */
    .opt.correct {
      background: var(--correct-bg);
      border-color: #b5d4b2;
    }
    .opt.correct span { color: var(--correct); font-weight: 500; }

    .opt.wrong {
      background: var(--wrong-bg);
      border-color: #e0baba;
    }
    .opt.wrong span { color: var(--wrong); }

    .opt.correct::after {
      content: '✓';
      margin-left: auto;
      color: var(--correct);
      font-weight: 600;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .opt.wrong::after {
      content: '✗';
      margin-left: auto;
      color: var(--wrong);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .q-block.answered { pointer-events: none; }

    /* ── Botón enviar ── */
    .submit-wrap {
      text-align: center;
      margin-top: 2.5rem;
    }

    .btn-submit {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--ink);
      border: none;
      padding: 0.9rem 3rem;
      border-radius: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: var(--accent); }
    .btn-submit:disabled { background: var(--ink-faint); cursor: not-allowed; }

    .submit-note {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ── Mensaje final ── */
    .thankyou {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-top: 2rem;
    }

    .thankyou-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .thankyou h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .thankyou p {
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ── Divisor ── */
    .divider {
      text-align: center;
      margin: 2.5rem 0;
      color: var(--border);
      letter-spacing: 0.4em;
      font-size: 0.8rem;
    }

    @media (max-width: 560px) {
      main { padding: 2rem 1.25rem 4rem; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .datos-section, .q-block { padding: 1.25rem 1.25rem; }
      .opts { padding-left: 0; }
      header { padding: 2.5rem 1.25rem 2rem; }
    }
  </style>
</head>
<body>

<header>
  <p class="header-label">Historia del Mundo Contemporáneo · 1.º Bachillerato</p>
  <h1>Control de lectura<br><em>Entre tonos de gris</em></h1>
  <p class="header-author">Ruta Sepetys</p>
  <div class="header-rule"></div>
</header>

<main>

  <div class="datos-section">
    <p class="section-title">Datos del alumno</p>
    <div class="form-grid">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
      </div>
      <div class="field">
        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" placeholder="Tus apellidos" required>
      </div>
      <div class="field full">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" required>
      </div>
    </div>
  </div>

  <div class="divider">· · ·</div>

  <div id="quiz"></div>

  <div class="submit-wrap">
    <button class="btn-submit" id="btn-submit">Enviar respuestas</button>
    <p class="submit-note">Asegúrate de haber respondido todas las preguntas antes de enviar.</p>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="thankyou-icon">✦</div>
    <h2>Respuestas enviadas</h2>
    <p>Tu control ha sido registrado correctamente. Gracias.</p>
  </div>

</main>

<script>
const questions = [
  { q: "¿En qué país vive Lina Vilkas al comienzo de la novela?", opts: ["Polonia", "Letonia", "Lituania", "Estonia"], ans: 2 },
  { q: "¿Cuántos años tiene Lina cuando comienza la historia?", opts: ["14 años", "15 años", "16 años", "17 años"], ans: 2 },
  { q: "¿Cuál es la ocupación del padre de Lina?", opts: ["Médico", "Rector de universidad", "Militar", "Comerciante"], ans: 1 },
  { q: "¿Qué talento especial posee Lina y que juega un papel importante en la novela?", opts: ["Toca el piano", "Habla varios idiomas", "Dibuja y pinta", "Escribe poesía"], ans: 2 },
  { q: "¿Quién llega a detener a la familia Vilkas en plena noche?", opts: ["Soldados nazis", "Agentes del NKVD soviético", "Policías lituanos", "Milicias locales"], ans: 1 },
  { q: "¿Cómo se llama el hermano menor de Lina?", opts: ["Jonas", "Andrius", "Aleksas", "Petras"], ans: 0 },
  { q: "¿A qué artista admira especialmente Lina y cuya obra intenta emular?", opts: ["Picasso", "Edvard Munch", "Vincent van Gogh", "Salvador Dalí"], ans: 2 },
  { q: "¿En qué tipo de transporte son trasladados los deportados durante la mayor parte del viaje?", opts: ["Camiones militares", "Vagones de ganado del tren", "Barcos de carga", "Autobuses requisados"], ans: 1 },
  { q: "¿Cómo se llama el joven lituano del que Lina se va enamorando a lo largo de la novela?", opts: ["Jonas", "Aleksas", "Andrius", "Petras"], ans: 2 },
  { q: "¿Qué sucede con el padre de Lina tras la detención familiar?", opts: ["Escapa a Suecia", "Es enviado a una prisión diferente, separado de ellos", "Muere en el trayecto", "Es liberado por los soviéticos"], ans: 1 },
  { q: "¿Cuál es la primera gran colonia en la que trabajan Lina y su familia al llegar a Siberia?", opts: ["Una mina de carbón", "Una granja de remolacha azucarera", "Una fábrica de madera", "Un campo de trabajo cerca de Altái"], ans: 1 },
  { q: "¿Qué enfermedad amenaza gravemente la vida del hermano de Lina durante el deportamiento?", opts: ["Tuberculosis", "Tifus", "Escorbuto", "Neumonía"], ans: 0 },
  { q: "¿Cuál es el papel del personaje conocido como el guardián soviético joven?", opts: ["Es el villano principal que tortura a los prisioneros", "Muestra cierta ambigüedad moral y en ocasiones ayuda a los deportados", "Es el comandante del campo", "Es un prisionero político como Lina"], ans: 1 },
  { q: "¿Por qué los dibujos que hace Lina tienen tanta importancia estratégica en la novela?", opts: ["Valen dinero para comprar comida", "Son un medio para enviar mensajes ocultos y documentar lo ocurrido", "Le permiten ganarse el favor de los guardias", "Sirven como prueba de su inocencia ante el NKVD"], ans: 1 },
  { q: "¿Hacia dónde son trasladados finalmente Lina y los demás deportados en la parte final de la novela?", opts: ["Un campo cerca del mar Caspio", "El Ártico, en la península de Yamal", "Las estepas de Kazajistán", "Siberia central, cerca del lago Baikal"], ans: 1 },
  { q: "¿Qué objeto entierra Lina en el suelo ártico con la esperanza de que algún día sea encontrado?", opts: ["Una carta dirigida a su padre", "Una caja con dibujos y un diario que documenta el deportamiento", "El retrato de su familia", "Un libro de poemas lituanos"], ans: 1 },
  { q: "¿Cómo se llama la madre de Lina?", opts: ["Elena", "Ona", "Marta", "Rasa"], ans: 0 },
  { q: "¿Qué año describe el epílogo como el momento en que Lina puede finalmente contar su historia públicamente?", opts: ["1953, tras la muerte de Stalin", "1972", "1989, con la caída del telón de acero", "1991, con la independencia de Lituania"], ans: 3 },
  { q: "¿Cuál es el tema central que articula toda la novela?", opts: ["La Segunda Guerra Mundial vista desde el frente alemán", "Las deportaciones estalinistas de los pueblos bálticos y la resistencia de la memoria", "La colaboración de los países bálticos con la Alemania nazi", "La vida cotidiana en la Unión Soviética durante los años 40"], ans: 1 },
  { q: "¿Qué idea resume mejor el mensaje final de la novela?", opts: ["La violencia siempre triunfa sobre la bondad", "Recordar y testimoniar es una forma de resistencia y de supervivencia", "Solo la huida individual garantiza la salvación", "La historia la escriben los vencedores y no puede cambiarse"], ans: 1 }
];

const quiz = document.getElementById('quiz');

questions.forEach((q, i) => {
  const block = document.createElement('div');
  block.className = 'q-block';
  block.id = 'q' + i;
  const optsHtml = q.opts.map((o, j) => `
    <label class="opt" id="opt-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}">
      <span>${o}</span>
    </label>`).join('');
  block.innerHTML = `
    <div class="q-header">
      <span class="q-num">Pregunta ${i + 1}</span>
      <p class="q-text">${q.q}</p>
    </div>
    <div class="opts">${optsHtml}</div>`;
  quiz.appendChild(block);
});

document.getElementById('btn-submit').addEventListener('click', async () => {
  // Validar datos del alumno
  const nombre = document.getElementById('nombre').value.trim();
  const apellidos = document.getElementById('apellidos').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!nombre || !apellidos || !email) {
    alert('Por favor, rellena tu nombre, apellidos y correo electrónico antes de enviar.');
    return;
  }
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    alert('Por favor, introduce un correo electrónico válido.');
    return;
  }

  // Validar que todas las preguntas estén respondidas
  let unanswered = [];
  questions.forEach((_, i) => {
    if (!document.querySelector(`input[name="q${i}"]:checked`)) unanswered.push(i + 1);
  });
  if (unanswered.length > 0) {
    alert(`Faltan por responder las preguntas: ${unanswered.join(', ')}.`);
    return;
  }

  // Corregir y construir el resumen
  let score = 0;
  let resumenLineas = [];

  questions.forEach((q, i) => {
    const chosen = parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
    const esCorrecta = chosen === q.ans;
    if (esCorrecta) score++;
    const marca = esCorrecta ? '✓ CORRECTO' : '✗ INCORRECTO';
    resumenLineas.push(`P${i + 1}. ${q.q}\n   Respuesta: ${q.opts[chosen]} — ${marca}${!esCorrecta ? ` (Correcta: ${q.opts[q.ans]})` : ''}`);
  });

  const nota = ((score / questions.length) * 10).toFixed(1);
  const resumenTexto = resumenLineas.join('\n\n');

  // Enviar a Formspree
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enviando…';

  try {
    const payload = {
      nombre,
      apellidos,
      email,
      nota: `${nota} / 10 (${score} de ${questions.length} correctas)`,
      respuestas: resumenTexto
    };

    const res = await fetch('https://formspree.io/f/xaqvoaqj', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      // Ocultar formulario y mostrar mensaje
      document.querySelector('.datos-section').style.display = 'none';
      document.querySelector('.divider').style.display = 'none';
      quiz.style.display = 'none';
      document.querySelector('.submit-wrap').style.display = 'none';
      document.getElementById('thankyou').style.display = 'block';
    } else {
      throw new Error('Error en el envío');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Enviar respuestas';
    alert('Ha habido un problema al enviar el formulario. Por favor, inténtalo de nuevo.');
  }
});
</script>

</body>
</html>

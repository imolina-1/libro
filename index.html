<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de lectura</title>

<style>
body {
  font-family: sans-serif;
  -webkit-user-select: none;
  user-select: none;
}
input { user-select: text; }

#timer {
  position: fixed;
  top: 10px;
  right: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="timer">25:00</div>

<h2>Nombre</h2>
<input id="nombre">
<h2>Email</h2>
<input id="email">

<div id="quiz"></div>

<button id="btn-submit">Enviar</button>

<script>
// =======================
// CONFIGURACIÓN SEGURIDAD
// =======================
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('touchstart', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

history.pushState(null, null, location.href);
window.onpopstate = () => history.go(1);

// =======================
// TIEMPO
// =======================
const startTime = new Date();
let timeLeft = 25 * 60;
let tabSwitches = [];

function startTimer() {
  const el = document.getElementById('timer');

  setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;

    if (timeLeft <= 0) {
      alert("Tiempo terminado");
      document.getElementById('btn-submit').click();
    }
  }, 1000);
}
startTimer();

// =======================
// CAMBIO DE PESTAÑA
// =======================
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    tabSwitches.push(new Date().toLocaleString());
    saveProgress();
  }
});

// =======================
// PREGUNTAS
// =======================
const questions = [
  { q: "Capital de Francia", opts: ["Madrid","París","Roma","Berlín"], ans: 1 },
  { q: "2 + 2", opts: ["3","4","5","6"], ans: 1 }
];

// shuffle
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// aleatorizar
shuffle(questions);
questions.forEach(q=>{
  const mix = q.opts.map((o,i)=>({o,correct:i===q.ans}));
  shuffle(mix);
  q.opts = mix.map(x=>x.o);
  q.ans = mix.findIndex(x=>x.correct);
});

// =======================
// RENDER
// =======================
const quiz = document.getElementById('quiz');

questions.forEach((q,i)=>{
  const div = document.createElement('div');
  div.innerHTML = `<p>${q.q}</p>` +
    q.opts.map((o,j)=>
      `<label><input type="radio" name="q${i}" value="${j}">${o}</label><br>`
    ).join('');
  quiz.appendChild(div);
});

// =======================
// AUTOGUARDADO
// =======================
function getAnswers() {
  const answers = {};
  questions.forEach((q,i)=>{
    const r = document.querySelector(`input[name=q${i}]:checked`);
    if(r) answers[i] = r.value;
  });
  return answers;
}

function saveProgress() {
  const data = {
    nombre: document.getElementById('nombre').value,
    email: document.getElementById('email').value,
    answers: getAnswers(),
    timeLeft,
    tabSwitches
  };
  localStorage.setItem("examProgress", JSON.stringify(data));
}

// guardar cada 10 segundos
setInterval(saveProgress, 10000);

// guardar al responder
quiz.addEventListener('change', saveProgress);
document.getElementById('nombre').addEventListener('input', saveProgress);
document.getElementById('email').addEventListener('input', saveProgress);

// =======================
// RECUPERAR PROGRESO
// =======================
function loadProgress() {
  const saved = localStorage.getItem("examProgress");
  if(!saved) return;

  const data = JSON.parse(saved);

  document.getElementById('nombre').value = data.nombre || "";
  document.getElementById('email').value = data.email || "";

  if(data.timeLeft) timeLeft = data.timeLeft;
  if(data.tabSwitches) tabSwitches = data.tabSwitches;

  if(data.answers){
    Object.entries(data.answers).forEach(([i,val])=>{
      const input = document.querySelector(`input[name=q${i}][value="${val}"]`);
      if(input) input.checked = true;
    });
  }
}

loadProgress();

// =======================
// ENVÍO
// =======================
document.getElementById('btn-submit').onclick = async () => {

  const nombre = document.getElementById('nombre').value;
  const email = document.getElementById('email').value;

  const endTime = new Date();

  let score = 0;
  questions.forEach((q,i)=>{
    const r = document.querySelector(`input[name=q${i}]:checked`);
    if(r && parseInt(r.value) === q.ans) score++;
  });

  const payload = {
    nombre,
    email,
    inicio: startTime.toLocaleString(),
    envio: endTime.toLocaleString(),
    cambios_pestana: tabSwitches,
    nota: score + "/" + questions.length
  };

  await fetch("https://formspree.io/f/xaqvoaqj", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  localStorage.removeItem("examProgress");

  alert("Enviado");
};
</script>

</body>
</html>
